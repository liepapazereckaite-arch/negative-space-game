<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Negative Space</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  body {
    background: #0a0e12;
    overflow: hidden;
    font-family: 'Press Start 2P', monospace;
    font-weight: 500;
    cursor: none;
  }
  #hud {
    position: fixed;
    top: 28px;
    left: 32px;
    z-index: 10;
    user-select: none;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .stat {
    display: flex;
    flex-direction: column;
    line-height: 1;
  }
  .stat-label {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #4a5a52;
    margin-bottom: 2px;
  }
  .stat-primary .stat-value {
    font-size: 18px;
    font-weight: 700;
    color: #39FF6A;
  }
  .stat-secondary {
    margin-top: 2px;
  }
  .stat-secondary .stat-label {
    font-size: 8px;
  }
  .stat-secondary .stat-value {
    font-size: 10px;
    font-weight: 600;
    color: #7a8c84;
  }
  .stat-secondary:last-child .stat-value {
    color: #6b7d75;
    font-weight: 500;
  }
  .overlay-screen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(10, 14, 18, 0.96);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 20;
    text-align: center;
    cursor: auto;
    transition: background 0.4s ease;
  }
  /* The "truly out of space" ending: pure black, nothing left, not even the
     dim ambient glow the regular overlay keeps. */
  .overlay-screen.space-exhausted {
    background: rgba(0, 0, 0, 1);
  }
  .overlay-screen.space-exhausted h1,
  .overlay-screen.space-exhausted #deathSubtitle,
  .overlay-screen.space-exhausted #finalScore {
    color: #888;
  }
  .overlay-screen.space-exhausted #deathSubtitle {
    color: #555;
  }
  .overlay-screen.space-exhausted .leaderboard,
  .overlay-screen.space-exhausted .leaderboard li .lb-name {
    color: #666;
  }
  .overlay-screen.space-exhausted .leaderboard li .lb-score {
    color: #444;
  }
  .overlay-screen h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0px;
    margin-bottom: 14px;
    color: #39FF6A;
  }
  #deathSubtitle {
    font-size: 9px;
    font-weight: 500;
    color: #6b7d75;
    margin-bottom: 18px;
    margin-top: -10px;
  }
  .overlay-screen p {
    font-size: 10px;
    font-weight: 500;
    margin-bottom: 24px;
    color: #7a8c84;
    max-width: 400px;
    line-height: 1.5;
  }
  #newRecordMsg {
    font-size: 9px;
    font-weight: 400;
    color: #FF2D95;
    margin-bottom: 8px;
    letter-spacing: 0.5px;
  }
  .overlay-screen button {
    padding: 14px 28px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.3px;
    font-family: 'Press Start 2P', monospace;
    cursor: pointer;
    border: 3px solid #0a0e12;
    border-radius: 0;
    background: #FF2D95;
    color: #0a0e12;
    box-shadow: 5px 5px 0 #00000080, 0 0 0 2px #FF2D95;
    image-rendering: pixelated;
    transition: none;
    animation: arcadeBlink 1.4s steps(1) infinite;
    position: relative;
    top: 0;
    left: 0;
  }
  @keyframes arcadeBlink {
    0%, 60% { background: #FF2D95; }
    61%, 100% { background: #39FF6A; }
  }
  .overlay-screen button:hover {
    animation: none;
    background: #39FF6A;
  }
  .overlay-screen button:active {
    animation: none;
    background: #39FF6A;
    top: 5px;
    left: 5px;
    box-shadow: 0 0 0 #00000080, 0 0 0 2px #39FF6A;
  }
  #nameInput {
    padding: 11px 18px;
    font-size: 9px;
    font-weight: 500;
    border: 2px solid #2a3a32;
    border-radius: 4px;
    margin-bottom: 18px;
    text-align: center;
    width: 220px;
    font-family: 'Press Start 2P', monospace;
    background: #0d1410;
    color: #39FF6A;
  }
  #nameInput:focus {
    outline: none;
    border-color: #FF2D95;
  }
  .leaderboard {
    margin-top: 26px;
    font-size: 9px;
    font-weight: 500;
    color: #6b7d75;
    min-width: 220px;
  }
  .leaderboard h2 {
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #4a5a52;
    margin-bottom: 10px;
    font-weight: 500;
  }
  .leaderboard ol {
    list-style: none;
    text-align: left;
    display: inline-block;
  }
  .leaderboard li {
    display: flex;
    justify-content: space-between;
    gap: 24px;
    padding: 4px 0;
  }
  .leaderboard li .lb-name {
    color: #9fb5aa;
  }
  .leaderboard li .lb-score {
    color: #39FF6A;
    font-variant-numeric: tabular-nums;
  }
  #milestone {
    position: fixed;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.3px;
    color: #9fb5aa;
    z-index: 15;
    pointer-events: none;
    opacity: 0;
    user-select: none;
    text-align: center;
    transition: opacity 0.6s ease;
  }
  canvas {
    display: block;
  }
  #scanlines {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 30;
    background: repeating-linear-gradient(
      to bottom,
      rgba(0, 0, 0, 0.18) 0px,
      rgba(0, 0, 0, 0.18) 1px,
      rgba(0, 0, 0, 0) 2px,
      rgba(0, 0, 0, 0) 3px
    );
    mix-blend-mode: multiply;
  }
  #vignette {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 29;
    background: radial-gradient(ellipse at center, rgba(0,0,0,0) 55%, rgba(0,0,0,0.45) 100%);
  }
</style>
</head>
<body>

<div id="scanlines"></div>
<div id="vignette"></div>
<div id="hud">
  <div class="stat stat-primary">
    <span class="stat-label">Level</span>
    <span class="stat-value" id="levelDisplay">1</span>
  </div>
  <div class="stat stat-primary">
    <span class="stat-label">Score</span>
    <span class="stat-value" id="timer">0.0</span>
  </div>
  <div class="stat stat-primary">
    <span class="stat-label">Space left</span>
    <span class="stat-value" id="spaceLeft">100%</span>
  </div>
  <div class="stat stat-secondary">
    <span class="stat-label">🪙 Coins left</span>
    <span class="stat-value" id="orbsLeft">5</span>
  </div>
  <div class="stat stat-secondary">
    <span class="stat-label">Risk</span>
    <span class="stat-value" id="multiplier">x1.0</span>
  </div>
  <div class="stat stat-secondary">
    <span class="stat-label">Best</span>
    <span class="stat-value" id="best">0.0</span>
  </div>
  <div class="stat stat-secondary">
    <span class="stat-label"></span>
    <span class="stat-value" id="dashStatus">Dash ready</span>
  </div>
  <div class="stat stat-secondary">
    <span class="stat-label"></span>
    <span class="stat-value" id="campWarning" style="display:none; color:#C62828;">Keep moving — it's feeding</span>
  </div>
</div>

<div id="milestone"></div>

<div id="intro" class="overlay-screen">
  <h1>Negative Space</h1>
  <p>Follow your cursor. Avoid the blobs. Survive as long as you can.</p>
  <input id="nameInput" type="text" placeholder="Enter your name" maxlength="16">
  <button id="startBtn">Start</button>
  <div class="leaderboard" id="introLeaderboard"></div>
</div>

<div id="overlay" class="overlay-screen" style="display:none;">
  <h1 id="overlayTitle">Out of space</h1>
  <p id="deathSubtitle">There was still room out there.</p>
  <p id="newRecordMsg" style="display:none;">New best score!</p>
  <p id="finalScore">Survived: 0.0s</p>
  <button id="restartBtn">Try again</button>
  <div class="leaderboard" id="overlayLeaderboard"></div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const timerDisplay = document.getElementById("timer");
const multiplierDisplay = document.getElementById("multiplier");
const spaceLeftDisplay = document.getElementById("spaceLeft");
const dashStatusDisplay = document.getElementById("dashStatus");
const campWarningDisplay = document.getElementById("campWarning");
const levelDisplay = document.getElementById("levelDisplay");
const orbsLeftDisplay = document.getElementById("orbsLeft");
const bestDisplay = document.getElementById("best");
const overlay = document.getElementById("overlay");
const intro = document.getElementById("intro");
const milestoneEl = document.getElementById("milestone");
const finalScoreDisplay = document.getElementById("finalScore");
const newRecordMsg = document.getElementById("newRecordMsg");
const overlayTitle = document.getElementById("overlayTitle");
const deathSubtitle = document.getElementById("deathSubtitle");
const restartBtn = document.getElementById("restartBtn");
const startBtn = document.getElementById("startBtn");
const nameInput = document.getElementById("nameInput");
const introLeaderboard = document.getElementById("introLeaderboard");
const overlayLeaderboard = document.getElementById("overlayLeaderboard");

// Draws a blob as a grid of blocky squares approximating a circle, snapped to
// a global pixel grid — gives the hazards a chunky 8-bit sprite look instead
// of a smooth circle. Visual only; collision still uses the plain circular
// baseRadius, so this never changes the actual fairness of the game.
const PIXEL_SIZE = 7;
// Draws a clean Mario-style pixel coin: dark outline circle, yellow fill,
// white highlight strip on the left. Simple and reliable canvas drawing.
function drawCoin(cx, cy, radius) {
  const P = PIXEL_SIZE;
  const r = Math.max(P * 3, Math.round(radius / P) * P);

  // 1 — dark outer ring
  ctx.fillStyle = "#111111";
  drawPixelatedCircle(cx, cy, r);

  // 2 — yellow main body
  ctx.fillStyle = "#FFD93D";
  drawPixelatedCircle(cx, cy, r - P);

  // 3 — slightly darker gold inner band
  ctx.fillStyle = "#E6A800";
  drawPixelatedCircle(cx, cy, r - P * 2);

  // 4 — bright yellow center
  ctx.fillStyle = "#FFE55C";
  drawPixelatedCircle(cx, cy, r - P * 3);

  // 5 — dark vertical slot (the "D" coin detail)
  ctx.fillStyle = "#111111";
  const slotW = P * 2;
  const slotH = Math.round((r - P * 3) * 1.4);
  ctx.fillRect(Math.round(cx - slotW / 2), Math.round(cy - slotH / 2), slotW, slotH);

  // 6 — white highlight on the left edge
  ctx.fillStyle = "#FFFFFF";
  ctx.fillRect(
    Math.round(cx - r + P * 1.5),
    Math.round(cy - (r - P * 3)),
    P,
    Math.round((r - P * 3) * 2)
  );

  // 7 — small sparkle on top-right: makes it pop and signal "collect me"
  ctx.fillStyle = "#FFFFFF";
  ctx.fillRect(Math.round(cx + r * 0.4), Math.round(cy - r * 0.6), P, P);
  ctx.fillStyle = "rgba(255,255,255,0.5)";
  ctx.fillRect(Math.round(cx + r * 0.4 - P), Math.round(cy - r * 0.6), P, P);
  ctx.fillRect(Math.round(cx + r * 0.4 + P), Math.round(cy - r * 0.6), P, P);
  ctx.fillRect(Math.round(cx + r * 0.4), Math.round(cy - r * 0.6 - P), P, P);
  ctx.fillRect(Math.round(cx + r * 0.4), Math.round(cy - r * 0.6 + P), P, P);
}

function drawPixelatedCircle(cx, cy, radius) {
  if (radius <= 0) return;

  const minX = Math.floor((cx - radius) / PIXEL_SIZE) * PIXEL_SIZE;
  const maxX = Math.ceil((cx + radius) / PIXEL_SIZE) * PIXEL_SIZE;
  const minY = Math.floor((cy - radius) / PIXEL_SIZE) * PIXEL_SIZE;
  const maxY = Math.ceil((cy + radius) / PIXEL_SIZE) * PIXEL_SIZE;
  const radiusSq = radius * radius;

  for (let y = minY; y < maxY; y += PIXEL_SIZE) {
    for (let x = minX; x < maxX; x += PIXEL_SIZE) {
      const dx = (x + PIXEL_SIZE / 2) - cx;
      const dy = (y + PIXEL_SIZE / 2) - cy;
      if (dx * dx + dy * dy <= radiusSq) {
        ctx.fillRect(x, y, PIXEL_SIZE, PIXEL_SIZE);
      }
    }
  }
}

// Interpolates between two hex colors (e.g. "#ffffff") by factor t (0 to 1)
// Shown only during the slow-motion death moment, and only if the player has
// enough banked score and hasn't already used their one escape this run.
function drawEscapePrompt() {
  if (escapeUsedThisRun || score < ESCAPE_COST) return;

  ctx.textAlign = "center";
  ctx.font = "600 18px 'Press Start 2P', monospace";
  ctx.fillStyle = "#FF2D95";
  ctx.fillText("Press SPACE to tear through (-" + ESCAPE_COST + ")", canvas.width / 2, canvas.height / 2 - 50);
}

function lerpColor(hexA, hexB, t) {
  const a = parseInt(hexA.slice(1), 16);
  const b = parseInt(hexB.slice(1), 16);
  const ar = (a >> 16) & 255, ag = (a >> 8) & 255, ab = a & 255;
  const br = (b >> 16) & 255, bg = (b >> 8) & 255, bb = b & 255;
  const r = Math.round(ar + (br - ar) * t);
  const g = Math.round(ag + (bg - ag) * t);
  const bl = Math.round(ab + (bb - ab) * t);
  return "rgb(" + r + "," + g + "," + bl + ")";
}

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

// ----- Starfield: a scattered universe slowly being swallowed by the blobs -----
let stars = [];
function generateStars() {
  stars = [];
  const STAR_COUNT = Math.floor((canvas.width * canvas.height) / 9000);
  for (let i = 0; i < STAR_COUNT; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: 0.6 + Math.random() * 1.4,
      twinkleSpeed: 0.5 + Math.random() * 1.5,
      twinklePhase: Math.random() * Math.PI * 2
    });
  }
}
generateStars();
window.addEventListener("resize", generateStars);

// ----- Player (the dot living in the white space) -----
let player = {
  x: canvas.width / 2,
  y: canvas.height / 2,
  radius: 8,
  vx: 0,
  vy: 0
};

const ACCEL = 0.6;      // how strongly the player accelerates toward the mouse
const FRICTION = 0.92;  // velocity damping each frame, creates the "inertia" feel
const MAX_SPEED = 9;

// Dash: a short burst of speed the player can trigger on demand, with a cooldown.
// Gives a real decision to make — save it for an emergency, or use it now to
// reach a safer pocket of space faster than inertia alone would allow.
const DASH_DURATION = 0.25;   // seconds the burst lasts
const DASH_COOLDOWN = 2.0;    // seconds before it can be used again
const DASH_SPEED_MULT = 3.2;  // how much MAX_SPEED is multiplied by during a dash
let dashActive = false;
let dashTimeLeft = 0;
let dashCooldownLeft = 0;

// Echo trail: a short history of recent player positions, drawn as fading dots
// behind the player to give movement a visible, slightly ghostly wake.
let trail = [];
const TRAIL_LENGTH = 14;

let mouse = { x: player.x, y: player.y };
window.addEventListener("mousemove", (e) => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  if (audioCtx && audioCtx.state === "suspended") {
    audioCtx.resume();
  }
});

function tryDash() {
  if (!dashActive && dashCooldownLeft <= 0 && !gameOver && !slowMoActive) {
    dashActive = true;
    dashTimeLeft = DASH_DURATION;
    dashCooldownLeft = DASH_COOLDOWN;

    // Always commit to an instant push toward the cursor, even if the player
    // is standing still. This is what makes dash a real risk: pressing it
    // doesn't just raise a speed ceiling, it physically launches you — so
    // mistiming it (e.g. cursor happens to be near a blob) can get you killed,
    // which is exactly what discourages mashing it "for free."
    const dx = mouse.x - player.x;
    const dy = mouse.y - player.y;
    const dist = Math.hypot(dx, dy) || 1; // avoid divide-by-zero if mouse is exactly on player
    const dirX = dx / dist;
    const dirY = dy / dist;
    const impulse = MAX_SPEED * DASH_SPEED_MULT;
    player.vx = dirX * impulse;
    player.vy = dirY * impulse;
  }
}

function tryEscape() {
  if (slowMoActive && !escapeTriggered && !escapeUsedThisRun && score >= ESCAPE_COST) {
    escapeTriggered = true;
  }
}

window.addEventListener("keydown", (e) => {
  if (e.code === "Space") {
    e.preventDefault();
    if (slowMoActive) {
      tryEscape();
    } else {
      tryDash();
    }
  }
});
window.addEventListener("mousedown", () => {
  if (slowMoActive) {
    tryEscape();
  } else {
    tryDash();
  }
});

// ----- Audio: a subtle, generated heartbeat that speeds up near danger -----
// No audio files needed — just a soft low thump synthesized with the Web Audio API.
// Volume and tempo scale with proximity to the nearest blob, and it's silent when safe,
// so it never becomes a constant, annoying drone.
let audioCtx = null;
let nextHeartbeatTime = 0;

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}

function playHeartbeatThump(volume) {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = "sine";
  osc.frequency.setValueAtTime(55, now); // low, soft thump rather than a beep

  gain.gain.setValueAtTime(0, now);
  gain.gain.linearRampToValueAtTime(volume, now + 0.02);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.18);

  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(now);
  osc.stop(now + 0.2);
}

// dangerLevel: 0 (safe, far from any blob) to 1 (right at the edge of one)
function updateHeartbeat(dangerLevel, dt) {
  if (!audioCtx || dangerLevel <= 0.05) return; // stay silent when there's no real threat

  nextHeartbeatTime -= dt;
  if (nextHeartbeatTime <= 0) {
    const volume = 0.04 + dangerLevel * 0.10; // always soft, never blaring
    playHeartbeatThump(volume);
    // interval shrinks as danger rises: ~1.1s when barely threatened, ~0.35s when critical
    nextHeartbeatTime = 1.1 - dangerLevel * 0.75;
  }
}

// A short, soft, bright "ding" — plays alongside each floating "+X" bonus popup
// so the reward for risky play is felt audibly too, not just seen.
function playBonusDing() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = "sine";
  osc.frequency.setValueAtTime(880, now); // bright but not piercing
  osc.frequency.exponentialRampToValueAtTime(1100, now + 0.08);

  gain.gain.setValueAtTime(0, now);
  gain.gain.linearRampToValueAtTime(0.025, now + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.22);

  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(now);
  osc.stop(now + 0.24);
}

// ----- Blobs (the encroaching black space) -----
// Each blob: x, y, baseRadius (used for collision), currentRadius (visual, includes pulse),
// growthRate (how fast baseRadius grows), pulseSpeed, pulseAmount, pulsePhase
let blobs = [];

// ----- Meteors: fast, short-lived hazards that streak straight across the
// screen, contrasting with the slow, looming danger of the blobs. They give
// a sudden reflex-based threat instead of the blobs' gradual pressure. -----
let meteors = [];
let meteorTimer = 0;
const METEOR_MIN_INTERVAL = 4.0;
const METEOR_MAX_INTERVAL = 8.0;
const METEOR_START_DELAY = 12; // seconds before the first meteor can appear, so the opening isn't overwhelming

// ----- Levels: collect all the orbs on screen to clear the board and move
// to the next level. Each level resets blobs/meteors from scratch, but danger
// ramps up faster with every level — early levels are gentle and quick to
// clear, later ones demand much more caution to reach the last few orbs.
let level = 1;
let levelElapsed = 0; // time since the current level started (drives difficulty ramp)
let orbs = [];
const ORBS_PER_LEVEL = 8;        // more coins per level
const ORBS_VISIBLE_AT_ONCE = 2;  // only show this many at a time — new one appears after a delay
const ORB_SPAWN_DELAY = 12;      // seconds to wait before spawning the next coin
let orbsCollectedThisLevel = 0;  // how many have been picked up
let orbsSpawnedThisLevel = 0;    // how many have appeared so far
let nextOrbTimer = 0;            // counts down to next coin spawn (0 = ready immediately)
const ORB_RADIUS = 28;
const ORB_PICKUP_BONUS = 5;

// Brief celebratory pause between levels: the board freezes (blobs stop
// growing, meteors stop moving) for a moment while a flash plays, before
// the next level's fresh board appears.
let levelTransitionActive = false;
let levelTransitionTimer = 0;
const LEVEL_TRANSITION_DURATION = 1.0;

// First-level hint: shown for the first few seconds of the very first level
// only, then fades out — explains the core collect mechanic once without
// repeating it every run after the player already knows.
let hintTimer = 10.0; // seconds to show the hint
let hintShown = false;

// Milestones: at each of these survival times, show a brief message marking
// that things just got tighter. Purely a "checkpoint" feel — no separate
// screens, no interruption to the endless flow.
// Level-based milestone messages — shown when a new level starts,
// replacing the old time-based ones which no longer made sense once
// the board started clearing between levels.
const LEVEL_MESSAGES = {
  2: "they're multiplying",
  3: "stay sharp",
  4: "it's getting hostile",
  5: "no mercy",
  7: "you're still here?",
  10: "seriously?",
  15: "you are the space"
};
let nextMilestoneIndex = 0;
let milestoneHideTimeout = null;

// Cyclic blob persistence: blobs accumulate for CYCLE_LENGTH levels,
// then the board clears — but each new cycle blobs grow faster.
// This keeps the "filling up" tension across multiple levels while
// still giving a reset reward every few levels.
const CYCLE_LENGTH = 3; // how many levels before a clear

function checkMilestones() {
  // now driven by levelUp() calling showMilestone() directly — this is a no-op
  // kept so existing calls to checkMilestones() in update() don't break
}

function getLevelMessage(lvl) {
  // Check for exact match first, then fall back to nearest lower key
  if (LEVEL_MESSAGES[lvl]) return LEVEL_MESSAGES[lvl];
  return null;
}

function showMilestone(text) {
  milestoneEl.textContent = text;
  milestoneEl.style.opacity = "1";
  if (milestoneHideTimeout) clearTimeout(milestoneHideTimeout);
  milestoneHideTimeout = setTimeout(() => {
    milestoneEl.style.opacity = "0";
  }, 2200);
}

let elapsed = 0;          // seconds survived — drives difficulty ramp and milestones
let score = 0;            // elapsed time + risk bonus — what's actually shown and saved
const RISK_BONUS_RATE = 4.5; // max extra points per second when right at a blob's edge

// white, estimated by sampling a grid of points and checking how many fall

// Camping penalty: standing nearly still feeds the nearest blob extra growth,
// so parking in one wide-open spot stops being a safe strategy — you have to
// keep moving and re-evaluating where the safest pocket of space is.
const CAMP_SPEED_THRESHOLD = 1.0;  // below this speed counts as "standing still"
const CAMP_GRACE_PERIOD = 1.5;     // seconds of stillness allowed before any penalty
const CAMP_RAMP_TIME = 3.0;        // seconds to reach full penalty intensity after grace period
const CAMP_EXTRA_GROWTH = 14;      // px/sec extra growth applied to the nearest blob at full intensity

let campIntensityGlobal = 0;
let campedBlobRef = null;
const SPACE_EXHAUSTION_THRESHOLD = 10; // % — below this, death counts as "truly out of space"

function recomputeSpaceLeft() {
  const stepX = canvas.width / SPACE_GRID_COLS;
  const stepY = canvas.height / SPACE_GRID_ROWS;
  let covered = 0;
  const total = SPACE_GRID_COLS * SPACE_GRID_ROWS;

  for (let row = 0; row < SPACE_GRID_ROWS; row++) {
    for (let col = 0; col < SPACE_GRID_COLS; col++) {
      const px = (col + 0.5) * stepX;
      const py = (row + 0.5) * stepY;
      for (let i = 0; i < blobs.length; i++) {
        const b = blobs[i];
        const dx = px - b.x;
        const dy = py - b.y;
        if (dx * dx + dy * dy <= b.baseRadius * b.baseRadius) {
          covered++;
          break;
        }
      }
    }
  }

  spaceLeftPercent = Math.max(0, Math.round(100 - (covered / total) * 100));
}

function spawnBlob() {
  // Spawn away from the player so it's not an instant unfair death, and away
  // from any uncollected orb so a level can never become impossible to clear
  // just from bad spawn luck.
  const MIN_DIST_FROM_PLAYER = 150;
  const MIN_DIST_FROM_ORBS = 90;
  let x, y;
  let attempts = 0;
  let found = false;

  while (attempts < 30) {
    x = Math.random() * canvas.width;
    y = Math.random() * canvas.height;
    attempts++;
    if (Math.hypot(x - player.x, y - player.y) < MIN_DIST_FROM_PLAYER) continue;

    let tooCloseToOrb = false;
    for (let i = 0; i < orbs.length; i++) {
      if (Math.hypot(x - orbs[i].x, y - orbs[i].y) < MIN_DIST_FROM_ORBS) {
        tooCloseToOrb = true;
        break;
      }
    }
    if (tooCloseToOrb) continue;

    found = true;
    break;
  }

  if (!found) return; // board too crowded right now, try again on the next spawn tick

  blobs.push({
    x: x,
    y: y,
    baseRadius: 10,
    growthRate: 2.0 + (level - 1) * 0.5,  // starts gentler, still ramps with each level
    pulseSpeed: 1.5 + Math.random() * 1.5,
    pulseAmount: 6 + Math.random() * 6,
    pulsePhase: Math.random() * Math.PI * 2,
    // Wobble parameters give each blob its own organic, ink-blot silhouette
    // instead of a perfect circle — each point around the edge bulges and
    // recedes independently over time.
    wobbleSeed: Math.random() * 100,
    wobbleSpeed: 0.4 + Math.random() * 0.4
  });
}

function spawnMeteor() {
  const edge = Math.floor(Math.random() * 4);
  let x, y, angle;
  const margin = 40;

  if (edge === 0) { x = Math.random() * canvas.width; y = -margin; angle = Math.PI / 2 + (Math.random() - 0.5); }
  else if (edge === 1) { x = canvas.width + margin; y = Math.random() * canvas.height; angle = Math.PI + (Math.random() - 0.5); }
  else if (edge === 2) { x = Math.random() * canvas.width; y = canvas.height + margin; angle = -Math.PI / 2 + (Math.random() - 0.5); }
  else { x = -margin; y = Math.random() * canvas.height; angle = 0 + (Math.random() - 0.5); }

  const speed = 420 + Math.random() * 180; // slightly faster
  meteors.push({
    x: x,
    y: y,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    radius: 10 + Math.random() * 4, // bigger nucleus
    edge: edge,           // which edge it came from (for warning indicator)
    warningShown: false,  // only show warning once per meteor
    entryX: x,
    entryY: y
  });
}

function spawnSingleOrb() {
  if (orbsSpawnedThisLevel >= ORBS_PER_LEVEL) return;

  const MIN_DIST_FROM_PLAYER = 120;
  const MIN_DIST_FROM_OTHER_ORBS = 90;
  const MIN_DIST_FROM_BLOB_EDGE = 30;

  let x, y, valid;
  let attempts = 0;
  do {
    x = Math.random() * canvas.width;
    y = Math.random() * canvas.height;
    valid = Math.hypot(x - player.x, y - player.y) >= MIN_DIST_FROM_PLAYER;

    if (valid) {
      for (let j = 0; j < orbs.length; j++) {
        if (Math.hypot(x - orbs[j].x, y - orbs[j].y) < MIN_DIST_FROM_OTHER_ORBS) {
          valid = false; break;
        }
      }
    }
    if (valid) {
      for (let j = 0; j < blobs.length; j++) {
        const b = blobs[j];
        if (Math.hypot(x - b.x, y - b.y) < b.baseRadius + ORB_RADIUS + MIN_DIST_FROM_BLOB_EDGE) {
          valid = false; break;
        }
      }
    }
    attempts++;
  } while (!valid && attempts < 50);

  orbs.push({ x: x, y: y });
  orbsSpawnedThisLevel++;
}

function spawnOrbsForLevel() {
  orbs = [];
  orbsCollectedThisLevel = 0;
  orbsSpawnedThisLevel = 0;
  nextOrbTimer = 0;
  // Only spawn the initial visible batch — the rest appear after a delay
  for (let i = 0; i < Math.min(ORBS_VISIBLE_AT_ONCE, ORBS_PER_LEVEL); i++) {
    spawnSingleOrb();
  }
}

function levelUp() {
  level++;
  levelElapsed = 0;
  meteors = [];
  timeSinceLastSpawn = 0;
  spawnInterval = Math.max(0.6, 2.4 - (level - 1) * 0.15);
  meteorTimer = METEOR_MIN_INTERVAL;

  // Cyclic persistence: board clears every CYCLE_LENGTH levels (level 4, 7, 10...),
  // otherwise blobs stay and keep accumulating. Each clear cycle the board
  // fills up faster because blob growthRate keeps climbing with level.
  const isResetLevel = (level - 1) % CYCLE_LENGTH === 0;

  if (isResetLevel) {
    blobs = [];
    showMilestone("Level " + level + " — cleared!");
  } else {
    const msg = getLevelMessage(level);
    showMilestone(msg ? "Level " + level + " — " + msg : "Level " + level + "!");
  }

  spawnOrbsForLevel();
}

function update(dt) {
  // Player physics: accelerate toward mouse, apply friction (inertia feel)
  const dx = mouse.x - player.x;
  const dy = mouse.y - player.y;
  player.vx += dx * ACCEL * dt;
  player.vy += dy * ACCEL * dt;

  // Gravity: nearby blobs (black holes) pull the player toward their center,
  // working against the cursor. The pull strengthens sharply the closer you
  // get to the edge, so cutting it close for the risk bonus carries a real
  // physical cost, not just a danger-zone number.
  const GRAVITY_RANGE = 150;     // px from the blob's edge where pull starts
  const GRAVITY_STRENGTH = 9000; // tuning constant for pull intensity
  for (let i = 0; i < blobs.length; i++) {
    const blob = blobs[i];
    const bx = blob.x - player.x;
    const by = blob.y - player.y;
    const dist = Math.hypot(bx, by) || 1;
    const edgeDist = dist - blob.baseRadius;
    if (edgeDist > 0 && edgeDist < GRAVITY_RANGE) {
      const safeEdgeDist = Math.max(20, edgeDist); // avoid runaway force right at the edge
      const pull = GRAVITY_STRENGTH / (safeEdgeDist * safeEdgeDist);
      player.vx += (bx / dist) * pull * dt;
      player.vy += (by / dist) * pull * dt;
    }
  }

  player.vx *= FRICTION;
  player.vy *= FRICTION;

  // Dash: while active, allow a much higher top speed for a brief burst
  const currentMaxSpeed = dashActive ? MAX_SPEED * DASH_SPEED_MULT : MAX_SPEED;
  const speed = Math.hypot(player.vx, player.vy);
  if (speed > currentMaxSpeed) {
    player.vx = (player.vx / speed) * currentMaxSpeed;
    player.vy = (player.vy / speed) * currentMaxSpeed;
  }

  // Tick dash duration and cooldown
  if (dashActive) {
    dashTimeLeft -= dt;
    if (dashTimeLeft <= 0) dashActive = false;
  }
  if (dashCooldownLeft > 0) {
    dashCooldownLeft = Math.max(0, dashCooldownLeft - dt);
  }

  player.x += player.vx;
  player.y += player.vy;

  // Keep player on screen
  player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, player.x));
  player.y = Math.max(player.radius, Math.min(canvas.height - player.radius, player.y));

  // Record position for the echo trail, keeping only the most recent points
  trail.push({ x: player.x, y: player.y });
  if (trail.length > TRAIL_LENGTH) trail.shift();

  // Difficulty ramps per level: each level starts a bit harsher than the last
  // (faster base spawn rate and growth), then ramps further the longer you
  // spend in that level — so early levels are gentle and quick to clear,
  // later ones demand real caution to reach the last few orbs.
  elapsed += dt;
  if (level === 1 && hintTimer > 0) hintTimer -= dt;
  levelElapsed += dt;
  checkMilestones();
  const levelBaseSpawnInterval = Math.max(0.8, 2.4 - (level - 1) * 0.15);
  spawnInterval = Math.max(0.6, levelBaseSpawnInterval - levelElapsed * 0.02);
  const levelBaseGrowth = 1 + (level - 1) * 0.25;
  const growthMultiplier = Math.min(levelBaseGrowth + 1.2, levelBaseGrowth + levelElapsed * 0.015);

  timeSinceLastSpawn += dt;
  if (!levelTransitionActive && timeSinceLastSpawn >= spawnInterval) {
    spawnBlob();
    timeSinceLastSpawn = 0;
  }

  // Meteors: spawn occasionally after an initial grace period (only on level 1;
  // later levels start them almost immediately since the player already knows
  // what they are), with both ends of the interval shrinking each level.
  const meteorStartDelay = level === 1 ? METEOR_START_DELAY : 2;
  const meteorMinInterval = Math.max(1.5, METEOR_MIN_INTERVAL - (level - 1) * 0.4);
  const meteorMaxInterval = Math.max(3.0, METEOR_MAX_INTERVAL - (level - 1) * 0.6);
  if (!levelTransitionActive && levelElapsed >= meteorStartDelay) {
    meteorTimer -= dt;
    if (meteorTimer <= 0) {
      spawnMeteor();
      meteorTimer = meteorMinInterval + Math.random() * (meteorMaxInterval - meteorMinInterval);
    }
  }

  if (!levelTransitionActive) {
    for (let i = meteors.length - 1; i >= 0; i--) {
      const m = meteors[i];
      m.x += m.vx * dt;
      m.y += m.vy * dt;

      const offScreen = m.x < -60 || m.x > canvas.width + 60 || m.y < -60 || m.y > canvas.height + 60;
      if (offScreen) {
        meteors.splice(i, 1);
        continue;
      }

      const dist = Math.hypot(player.x - m.x, player.y - m.y);
      if (dist < m.radius + player.radius && !slowMoActive && invulnerableTimeLeft <= 0) {
        slowMoActive = true;
        slowMoElapsed = 0;
        deathSpaceLeftSnapshot = spaceLeftPercent;
      }
    }
  }

  // Orb pickup: collect coins one by one. Each collected coin immediately
  // spawns a new one elsewhere so there's always something to chase.
  for (let i = orbs.length - 1; i >= 0; i--) {
    const orb = orbs[i];
    const dist = Math.hypot(player.x - orb.x, player.y - orb.y);
    if (dist < ORB_RADIUS + player.radius) {
      orbs.splice(i, 1);
      score += ORB_PICKUP_BONUS;
      orbsCollectedThisLevel++;
      playBonusDing();
      if (orbsSpawnedThisLevel < ORBS_PER_LEVEL) {
        spawnSingleOrb();
      }
    }
  }

  if (orbsCollectedThisLevel >= ORBS_PER_LEVEL && !levelTransitionActive) {
    levelTransitionActive = true;
    levelTransitionTimer = LEVEL_TRANSITION_DURATION;
  }

  if (levelTransitionActive) {
    levelTransitionTimer -= dt;
    if (levelTransitionTimer <= 0) {
      levelTransitionActive = false;
      levelUp();
    }
  }

  // Camping detection: standing nearly still feeds whichever blob is closest
  // to you, rather than letting players just park in one wide-open spot and
  // wait. Moving decays the timer twice as fast as standing still builds it,
  // so a player has to keep relocating, not just twitch occasionally.
  const playerSpeed = Math.hypot(player.vx, player.vy);
  if (playerSpeed < CAMP_SPEED_THRESHOLD) {
    campTimer += dt;
  } else {
    campTimer = Math.max(0, campTimer - dt * 2);
  }
  const campIntensity = Math.max(0, Math.min(1, (campTimer - CAMP_GRACE_PERIOD) / CAMP_RAMP_TIME));
  campIntensityGlobal = campIntensity;

  let nearestBlobToPlayer = null;
  let nearestBlobDist = Infinity;
  for (let i = 0; i < blobs.length; i++) {
    const d = Math.hypot(player.x - blobs[i].x, player.y - blobs[i].y);
    if (d < nearestBlobDist) { nearestBlobDist = d; nearestBlobToPlayer = blobs[i]; }
  }
  campedBlobRef = nearestBlobToPlayer;

  // Grow and pulse blobs — the one nearest the player grows extra while camping.
  // Growth is clamped so a blob can never fully engulf an uncollected orb —
  // it can get uncomfortably close, but a thin safety margin always remains,
  // so a level can never become literally unwinnable by bad luck. Frozen
  // entirely during the level transition pause.
  const ORB_SAFETY_MARGIN = 40; // covers both the collision buffer and the blob's visual pulse range
  if (!levelTransitionActive) {
    blobs.forEach(blob => {
      let growth = blob.growthRate * growthMultiplier * dt;
      if (campIntensity > 0 && blob === nearestBlobToPlayer) {
        growth += campIntensity * CAMP_EXTRA_GROWTH * dt;
      }

      let maxAllowedRadius = Infinity;
      for (let i = 0; i < orbs.length; i++) {
        const distToOrb = Math.hypot(blob.x - orbs[i].x, blob.y - orbs[i].y);
        const allowed = distToOrb - ORB_RADIUS - ORB_SAFETY_MARGIN;
        if (allowed < maxAllowedRadius) maxAllowedRadius = allowed;
      }

      blob.baseRadius = Math.min(blob.baseRadius + growth, Math.max(blob.baseRadius, maxAllowedRadius));
    });
  }

  // Collision: based on baseRadius only (pulse is visual-only for now)
  let nearestEdgeDist = Infinity; // distance from player to the nearest blob's edge
  for (const blob of blobs) {
    const dist = Math.hypot(player.x - blob.x, player.y - blob.y);
    const edgeDist = dist - blob.baseRadius - player.radius;
    if (edgeDist < nearestEdgeDist) nearestEdgeDist = edgeDist;
    if (dist < blob.baseRadius + player.radius && !slowMoActive && invulnerableTimeLeft <= 0) {
      slowMoActive = true;
      slowMoElapsed = 0;
      // Snapshot space-left right at the moment of contact: this distinguishes
      // "you got caught even though room still existed elsewhere" (a mistake)
      // from "there genuinely was nowhere left" (the real thematic ending).
      deathSpaceLeftSnapshot = spaceLeftPercent;
    }
  }

  // Danger ramps up as the player gets within ~120px of a blob's edge
  const DANGER_RANGE = 120;
  const dangerLevel = nearestEdgeDist === Infinity
    ? 0
    : Math.max(0, Math.min(1, 1 - nearestEdgeDist / DANGER_RANGE));
  // Heartbeat sound removed — felt redundant alongside the bonus ding and slightly grating

  // Score = time survived + a bonus for playing close to the edge. Standing safely
  // in open space still scores (1 point/sec, same as elapsed), but cutting it close
  // earns extra — a real reason to risk it rather than just retreat to the center.
  const riskBonus = dangerLevel * RISK_BONUS_RATE * dt;
  score += dt + riskBonus;

  // Expose the current multiplier (1.0x when safe, up to 1 + RISK_BONUS_RATE when
  // right at the edge) so the HUD can show *why* the score is climbing faster.
  currentMultiplier = 1 + dangerLevel * RISK_BONUS_RATE;

  // Recompute the live "space remaining" stat a few times a second
  spaceCheckTimer -= dt;
  if (spaceCheckTimer <= 0) {
    recomputeSpaceLeft();
    spaceCheckTimer = SPACE_CHECK_INTERVAL;
  }

  // Floating "+X" bonus popups: accumulate risk bonus and surface it periodically
  // as a small rising number near the player, so the reward for risk-taking is
  // felt in the moment, not just reflected silently in a growing total.
  bonusAccumulator += riskBonus;
  bonusPopupTimer -= dt;
  if (bonusPopupTimer <= 0) {
    if (bonusAccumulator > 0.15) {
      floatingTexts.push({
        x: player.x + (Math.random() * 16 - 8),
        y: player.y - player.radius - 6,
        text: "+" + bonusAccumulator.toFixed(1),
        life: 1.0
      });
      playBonusDing();
    }
    bonusAccumulator = 0;
    bonusPopupTimer = 1.0;
  }

  // Age and remove finished floating texts; they drift upward as they fade
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    floatingTexts[i].life -= dt / 0.9;
    floatingTexts[i].y -= dt * 26;
    if (floatingTexts[i].life <= 0) floatingTexts.splice(i, 1);
  }
}

function draw(time) {
  // Background: a soft radial gradient, lighter near the center (where the player
  // tends to stay), subtly deepening as time passes — a quiet visual cue that the
  // space itself is aging, without relying on any numbers.
  const progress = Math.min(1, elapsed / 120); // fully "settled" tone by ~2 minutes in
  const centerColor = lerpColor("#0a0e12", "#0d1410", progress);
  const edgeColor = lerpColor("#0a0e12", "#02100a", progress);

  const gradient = ctx.createRadialGradient(
    canvas.width / 2, canvas.height / 2, 0,
    canvas.width / 2, canvas.height / 2, Math.hypot(canvas.width, canvas.height) / 1.3
  );
  gradient.addColorStop(0, centerColor);
  gradient.addColorStop(1, edgeColor);

  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Draw the starfield: tiny twinkling dots representing the universe being
  // slowly consumed. Stars covered by a blob (black hole) simply don't get
  // drawn — visually, they've been swallowed.
  stars.forEach(star => {
    let covered = false;
    for (let i = 0; i < blobs.length; i++) {
      const b = blobs[i];
      const dx = star.x - b.x;
      const dy = star.y - b.y;
      if (dx * dx + dy * dy <= b.baseRadius * b.baseRadius) { covered = true; break; }
    }
    if (covered) return;

    const twinkle = 0.5 + 0.5 * Math.sin(time / 1000 * star.twinkleSpeed + star.twinklePhase);
    ctx.fillStyle = "rgba(230, 230, 240, " + (0.25 + twinkle * 0.55) + ")";
    ctx.fillRect(star.x - star.size, star.y - star.size, star.size * 2, star.size * 2);
  });

  // Draw blobs (chunky pixel-grid sprites instead of smooth circles)
  ctx.fillStyle = "#39FF6A";
  blobs.forEach(blob => {
    const pulse = Math.sin(time / 1000 * blob.pulseSpeed + blob.pulsePhase) * blob.pulseAmount;
    const visualRadius = Math.max(0, blob.baseRadius + pulse);
    drawPixelatedCircle(blob.x, blob.y, visualRadius);

    // Subtle warning outline on whichever blob is being fed by camping
    if (blob === campedBlobRef && campIntensityGlobal > 0) {
      ctx.strokeStyle = "rgba(198, 40, 40, " + (campIntensityGlobal * 0.6) + ")";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(blob.x, blob.y, visualRadius + 6, 0, Math.PI * 2);
      ctx.stroke();
    }
  });

  // Draw edge WARNING indicators for meteors that are just entering the screen
  // — gives the player a split-second heads-up of which direction danger is coming from.
  meteors.forEach(m => {
    const onScreen = m.x > 0 && m.x < canvas.width && m.y > 0 && m.y < canvas.height;
    if (onScreen) return; // only draw warning when meteor is still off-screen

    // Find the closest point on the screen edge to the meteor's entry position
    let wx = Math.max(20, Math.min(canvas.width - 20, m.entryX));
    let wy = Math.max(20, Math.min(canvas.height - 20, m.entryY));
    if (m.edge === 0) wy = 20;
    else if (m.edge === 1) wx = canvas.width - 20;
    else if (m.edge === 2) wy = canvas.height - 20;
    else wx = 20;

    // Flashing warning triangle
    const flash = Math.sin(Date.now() / 80) > 0;
    if (flash) {
      ctx.font = "bold 14px 'Press Start 2P', monospace";
      ctx.textAlign = "center";
      ctx.fillStyle = "#FF4E1F";
      ctx.fillText("!", wx, wy + 5);
    }
  });

  // Draw meteors: long dramatic tail + bright pixelated nucleus
  meteors.forEach(m => {
    const speed = Math.hypot(m.vx, m.vy) || 1;
    const dirX = m.vx / speed;
    const dirY = m.vy / speed;

    // Outer glow tail (wide, faint)
    const tailLength = 80;
    const glowGrad = ctx.createLinearGradient(
      m.x, m.y,
      m.x - dirX * tailLength, m.y - dirY * tailLength
    );
    glowGrad.addColorStop(0, "rgba(255, 120, 30, 0.35)");
    glowGrad.addColorStop(1, "rgba(255, 120, 30, 0)");
    ctx.strokeStyle = glowGrad;
    ctx.lineWidth = m.radius * 3.5;
    ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(m.x, m.y);
    ctx.lineTo(m.x - dirX * tailLength, m.y - dirY * tailLength);
    ctx.stroke();

    // Inner bright core tail (narrow, vivid)
    const coreGrad = ctx.createLinearGradient(
      m.x, m.y,
      m.x - dirX * tailLength * 0.6, m.y - dirY * tailLength * 0.6
    );
    coreGrad.addColorStop(0, "rgba(255, 220, 100, 0.95)");
    coreGrad.addColorStop(1, "rgba(255, 80, 10, 0)");
    ctx.strokeStyle = coreGrad;
    ctx.lineWidth = m.radius * 0.9;
    ctx.beginPath();
    ctx.moveTo(m.x, m.y);
    ctx.lineTo(m.x - dirX * tailLength * 0.6, m.y - dirY * tailLength * 0.6);
    ctx.stroke();

    // Nucleus: dark outline + bright orange-red center
    ctx.fillStyle = "#1a0800";
    drawPixelatedCircle(m.x, m.y, m.radius + PIXEL_SIZE);
    ctx.fillStyle = "#FF4E1F";
    drawPixelatedCircle(m.x, m.y, m.radius);
    ctx.fillStyle = "#FFD080";
    drawPixelatedCircle(m.x, m.y, Math.max(PIXEL_SIZE, m.radius - PIXEL_SIZE));
  });

  // Draw coins (Super Mario-style) on top of everything else so they're always
  // visible and instantly readable as "collect me" — orb shape alone could
  // read as just another background element.
  orbs.forEach(orb => {
    const pulse = 1 + Math.sin(time / 250 + orb.x) * 0.12;
    drawCoin(orb.x, orb.y, ORB_RADIUS * pulse);
  });

  // Draw echo trail: soft, evenly-sized fading dots (not tapering to a point,
  // which read more like a tail than a friendly trail)
  for (let i = 0; i < trail.length; i++) {
    const point = trail[i];
    const t = i / TRAIL_LENGTH; // 0 = oldest, 1 = newest
    ctx.fillStyle = "rgba(255, 45, 149, " + (t * 0.25) + ")";
    ctx.beginPath();
    ctx.arc(point.x, point.y, player.radius * 0.55, 0, Math.PI * 2);
    ctx.fill();
  }

  // Draw player: a friendly round dot with a soft glow and a thin white ring,
  // rather than a plain flat circle
  const glow = ctx.createRadialGradient(
    player.x, player.y, 0,
    player.x, player.y, player.radius * 2.2
  );
  glow.addColorStop(0, "rgba(255, 45, 149, 0.35)");
  glow.addColorStop(1, "rgba(255, 45, 149, 0)");
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(player.x, player.y, player.radius * 2.2, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = "#FF2D95";
  drawPixelatedCircle(player.x, player.y, player.radius);

  ctx.strokeStyle = "#fff";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(player.x, player.y, player.radius - 1, 0, Math.PI * 2);
  ctx.stroke();

  // Brief safety ring after an escape, fading out as invulnerability runs down
  if (invulnerableTimeLeft > 0) {
    const ringAlpha = invulnerableTimeLeft / ESCAPE_INVULN_DURATION;
    ctx.strokeStyle = "rgba(255, 45, 149, " + (ringAlpha * 0.6) + ")";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.radius + 8, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Draw floating "+X" bonus popups, rising and fading out
  ctx.textAlign = "center";
  ctx.font = "600 14px 'Press Start 2P', monospace";
  floatingTexts.forEach(popup => {
    ctx.fillStyle = "rgba(255, 45, 149, " + Math.max(0, popup.life) + ")";
    ctx.fillText(popup.text, popup.x, popup.y);
  });

  // First-level hint: shown only at the very start of the first run,
  // fades out after a few seconds once the player has had time to read it.
  if (level === 1 && hintTimer > 0) {
    const alpha = Math.min(1, hintTimer / 2); // fades over the last 2 seconds
    ctx.textAlign = "center";
    ctx.font = "700 11px 'Press Start 2P', monospace";
    ctx.fillStyle = "rgba(255, 217, 61, " + alpha + ")";
    ctx.fillText("COLLECT ALL COINS!", canvas.width / 2, canvas.height / 2 + 60);
    ctx.font = "700 8px 'Press Start 2P', monospace";
    ctx.fillStyle = "rgba(255, 45, 149, " + alpha * 0.8 + ")";
    ctx.fillText("avoid the blobs & comets", canvas.width / 2, canvas.height / 2 + 82);
  }

  // Level-cleared flash: a brief bright pulse plus text during the pause
  // between levels, while the board is frozen.
  if (levelTransitionActive) {
    const progress = 1 - (levelTransitionTimer / LEVEL_TRANSITION_DURATION); // 0 to 1
    const flashAlpha = Math.sin(progress * Math.PI) * 0.25; // peaks mid-transition, fades at both ends
    ctx.fillStyle = "rgba(57, 255, 106, " + flashAlpha + ")";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.textAlign = "center";
    ctx.font = "700 16px 'Press Start 2P', monospace";
    ctx.fillStyle = "#39FF6A";
    ctx.fillText("LEVEL CLEARED", canvas.width / 2, canvas.height / 2);
  }

  // Draw SPACE/DASH indicator at the bottom of the screen — much more visible
  // than a small HUD text line, and explains the mechanic at a glance.
  const barY = canvas.height - 28;
  const barCX = canvas.width / 2;
  ctx.font = "700 9px 'Press Start 2P', monospace";
  ctx.textAlign = "center";

  if (dashActive) {
    ctx.fillStyle = "#39FF6A";
    ctx.fillText("DASH >>>", barCX, barY);
  } else if (dashCooldownLeft > 0) {
    // Show a small progress bar counting down to ready
    const barW = 120;
    const filled = (1 - dashCooldownLeft / DASH_COOLDOWN) * barW;
    ctx.fillStyle = "#2a3a32";
    ctx.fillRect(Math.round(barCX - barW / 2), barY - 10, barW, 8);
    ctx.fillStyle = "#7a8c84";
    ctx.fillRect(Math.round(barCX - barW / 2), barY - 10, Math.round(filled), 8);
    ctx.fillStyle = "#4a5a52";
    ctx.fillText("SPACE: DASH  " + dashCooldownLeft.toFixed(1) + "s", barCX, barY + 6);
  } else {
    ctx.fillStyle = "#FF2D95";
    ctx.fillText("[ SPACE ] = DASH", barCX, barY);
  }

  timerDisplay.textContent = score.toFixed(1);
  levelDisplay.textContent = level;
  orbsLeftDisplay.textContent = (ORBS_PER_LEVEL - orbsCollectedThisLevel);

  multiplierDisplay.textContent = "x" + currentMultiplier.toFixed(1);
  multiplierDisplay.style.color = currentMultiplier > 1.3 ? "#C62828" : "#999";

  spaceLeftDisplay.textContent = spaceLeftPercent + "%";
  if (spaceLeftPercent <= 15) {
    spaceLeftDisplay.style.color = "#C62828";
  } else if (spaceLeftPercent <= 35) {
    spaceLeftDisplay.style.color = "#FF2D95";
  } else {
    spaceLeftDisplay.style.color = "#999";
  }

  if (dashActive) {
    dashStatusDisplay.textContent = "Dash active!";
  } else if (dashCooldownLeft > 0) {
    dashStatusDisplay.textContent = "Dash in " + dashCooldownLeft.toFixed(1) + "s";
  } else {
    dashStatusDisplay.textContent = "Dash ready (space)";
  }

  campWarningDisplay.style.display = campIntensityGlobal > 0 ? "block" : "none";
}

function loop(time) {
  if (lastTime === null) lastTime = time;
  const dt = Math.min((time - lastTime) / 1000, 0.05); // cap dt to avoid big jumps on tab switch
  lastTime = time;

  if (gameOver) {
    // Quick fade-to-black flash so the death reads as "swallowed" rather than an abrupt cut
    deathFlash = Math.min(1, deathFlash + dt * 4);
    draw(time);
    ctx.fillStyle = "rgba(0,0,0," + deathFlash + ")";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    if (deathFlash >= 1) {
      endGame();
      return;
    }
    requestAnimationFrame(loop);
    return;
  }

  if (slowMoActive) {
    if (escapeTriggered) {
      // Player spent their one-time escape: cancel the death, pay the cost,
      // and shove them clear of the blob with a brief window of safety so
      // they don't just get caught again on the very next frame.
      score -= ESCAPE_COST;
      escapeUsedThisRun = true;
      escapeTriggered = false;
      slowMoActive = false;
      invulnerableTimeLeft = ESCAPE_INVULN_DURATION;

      let nearestBlob = null;
      let nearestDist = Infinity;
      for (const blob of blobs) {
        const d = Math.hypot(player.x - blob.x, player.y - blob.y);
        if (d < nearestDist) { nearestDist = d; nearestBlob = blob; }
      }
      if (nearestBlob) {
        const dx = player.x - nearestBlob.x;
        const dy = player.y - nearestBlob.y;
        const dist = Math.hypot(dx, dy) || 1;
        const pushDist = nearestBlob.baseRadius + player.radius + 30;
        player.x = nearestBlob.x + (dx / dist) * pushDist;
        player.y = nearestBlob.y + (dy / dist) * pushDist;
        player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, player.x));
        player.y = Math.max(player.radius, Math.min(canvas.height - player.radius, player.y));
      }
      player.vx = 0;
      player.vy = 0;

      requestAnimationFrame(loop);
      return;
    }

    // Time stretches out right at the moment of contact: the player sees the
    // instant space ran out, rather than it happening too fast to register.
    slowMoElapsed += dt;
    const progress = Math.min(1, slowMoElapsed / SLOWMO_DURATION);
    const timeScale = 1 - progress * 0.92; // eases down to near-frozen, never fully 0

    update(dt * timeScale);
    draw(time);
    drawEscapePrompt();

    if (progress >= 1) {
      slowMoActive = false;
      gameOver = true;
    }
    requestAnimationFrame(loop);
    return;
  }

  if (invulnerableTimeLeft > 0) {
    invulnerableTimeLeft = Math.max(0, invulnerableTimeLeft - dt);
  }

  update(dt);
  draw(time);
  requestAnimationFrame(loop);
}

function endGame() {
  const isNewRecord = score > bestScore && bestScore > 0; // skip "new record" framing on someone's very first run
  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem("negativeSpaceBest", bestScore.toFixed(2));
  }
  bestDisplay.textContent = bestScore.toFixed(1);
  finalScoreDisplay.textContent = "Score: " + score.toFixed(1) + " — reached level " + level + " — survived " + elapsed.toFixed(1) + "s";

  // Two different endings, depending on how much space was actually left at
  // the moment of death: getting caught while room still existed elsewhere
  // is a mistake; the screen having nowhere left at all is the real ending
  // the whole concept is about.
  const trulyOutOfSpace = deathSpaceLeftSnapshot <= SPACE_EXHAUSTION_THRESHOLD;
  overlay.classList.toggle("space-exhausted", trulyOutOfSpace);

  if (trulyOutOfSpace) {
    deathSubtitle.textContent = "There was nowhere left to go.";
  } else {
    deathSubtitle.textContent = "There was still room out there — bad luck.";
  }

  if (isNewRecord) {
    overlayTitle.textContent = "New personal best!";
    newRecordMsg.style.display = "block";
  } else if (trulyOutOfSpace) {
    overlayTitle.textContent = "Out of space.";
    newRecordMsg.style.display = "none";
  } else {
    overlayTitle.textContent = "You got caught";
    newRecordMsg.style.display = "none";
  }

  // Save to Supabase and update leaderboard — async so the overlay shows immediately
  overlay.style.display = "flex";
  saveScoreToLeaderboard(playerName, score).then(updatedBoard => {
    renderLeaderboard(overlayLeaderboard, updatedBoard);
    renderLeaderboard(introLeaderboard, updatedBoard);
  });
}

restartBtn.addEventListener("click", () => {
  initAudio();
  resetGame();
});

// The intro screen now always shows on page load (not just once) because the
// leaderboard relies on a name being entered before each new player's run.
// "Try again" skips it since it's the same player continuing their session.
intro.style.display = "flex";
nameInput.focus();

startBtn.addEventListener("click", () => {
  playerName = nameInput.value.trim() || "Anonymous";
  localStorage.setItem("negativeSpaceLastName", playerName);
  initAudio();
  intro.style.display = "none";
  resetGame();
});

nameInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") startBtn.click();
});
</script>

</body>
</html>
